<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Outer workspace frame -->
  <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Three root folder tabs at the top -->
  <rect x="4" y="8" width="4" height="2" rx="0.5" fill="currentColor" opacity="0.9"/>
  <rect x="10" y="8" width="4" height="2" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="16" y="8" width="4" height="2" rx="0.5" fill="currentColor" opacity="0.5"/>
  <!-- Divider line -->
  <line x1="2" y1="11" x2="22" y2="11" stroke="currentColor" stroke-width="1"/>
  <!-- Folder icon in centre -->
  <path d="M7 14 h10 v4 H7 z" stroke="currentColor" stroke-width="1" fill="none" rx="1"/>
  <path d="M7 14 v-.5 a.5.5 0 0 1 .5-.5 h3 l1 1 H7 z" fill="currentColor" opacity="0.8"/>
</svg>
